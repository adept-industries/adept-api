name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  repository-checks:
    name: Repository checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Verify required foundation files
        shell: bash
        run: |
          test -f README.md
          test -f .gitignore
          test -f .editorconfig
          test -f PROJECT_POLICY.md
          test -f .github/CODEOWNERS
          test -f .github/pull_request_template.md

      - name: Reject committed local environment files
        shell: bash
        run: |
          tracked_env_files="$(
            git ls-files |
            grep -E '(^|/)\.env($|\.)' |
            grep -vE '(^|/)\.env\.example$' ||
            true
          )"

          if [ -n "$tracked_env_files" ]; then
            echo "Local environment files must not be committed:"
            echo "$tracked_env_files"
            exit 1
          fi

      - name: Repository foundation passed
        run: echo "Repository foundation checks passed."

  api-verification:
    name: API verification
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Temurin JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Verify Maven and Java versions
        shell: bash
        run: |
          toolchain_output="$(./mvnw -version)"
          echo "$toolchain_output"
          grep -q "Apache Maven 3.9.16" <<< "$toolchain_output"
          grep -Eq "Java version: 25([., ]|$)" <<< "$toolchain_output"

      - name: Verify Docker availability
        run: docker info

      - name: Build and test
        run: ./mvnw -B clean verify

      - name: Build API image
        run: docker build --tag adept-api:ci .
